<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PretzelSticksPapis</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <!-- Robot Check Overlay -->
  <div id="robot-check" class="robot-check-overlay">
    <div class="spinner"></div>
    <p>Verifying you are not a robot... <span id="countdown">3</span>s</p>
  </div>

  <!-- Welcome Banner -->
  <div id="welcome-banner" class="welcome-banner-overlay" style="display: none; opacity: 0;">
    <h1 class="brand-title" style="font-size: 3rem; text-shadow: 0 4px 15px rgba(0,0,0,0.8);">Welcome to PretzelSticksPapis</h1>
  </div>

  <!-- Modal Overlay -->
  <div id="lead-modal" class="modal-overlay" style="opacity: 0; pointer-events: none;">
    <div class="modal-card">
      <h1 class="brand-title">Partner With Us</h1>
      <p class="modal-subtitle">Join the PretzelSticksPapis network.</p>
      
      <form id="lead-form">
        <div class="input-group">
          <input type="tel" id="phone-number" placeholder="(555) 555-5555" required />
        </div>
        
        <div class="compliance-group">
          <label><input type="checkbox" id="consent-sms" required /> I agree to receive text messages</label>
          <label><input type="checkbox" id="consent-cookies" required /> I accept the use of cookies</label>
          <label><input type="checkbox" id="consent-tos" required /> I agree to the Terms of Service</label>
          <label><input type="checkbox" id="consent-privacy" required /> I agree to the Privacy Policy</label>
        </div>
        
        <div class="button-row">
          <button type="submit" class="btn-primary">AGREE</button>
          <button type="button" id="btn-later" class="btn-secondary">Maybe Later</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Scroll-Bound Video Animation -->
  <div class="scroling-video-container" id="video-container">
    <div class="scrolling-video">
      <video id="bg-video" preload="auto" muted playsinline>
        <source src="/myvideo/output.webm" type="video/webm">
        <source src="/myvideo/output.mp4" type="video/mp4">
      </video>
    </div>
  </div>

  <!-- Bottom CTA -->
  <div class="bottom-cta" id="bottom-cta">
    <button id="btn-wholesale" class="btn-cta">BECOME A RESELLER / BUY WHOLESALE</button>
  </div>

  <script src="/src/mock-api.js"></script>
  <script src="/src/main.js" type="module"></script>
</body>
</html>
